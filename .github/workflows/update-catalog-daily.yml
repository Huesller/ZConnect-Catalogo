name: Atualizar catálogo diariamente

on:
  schedule:
    - cron: "20 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-catalog-daily
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Baixar projeto
        uses: actions/checkout@v4

      - name: Preparar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Atualizar dados oficiais
        run: npm run update-catalog

      - name: Validar preços e funcionamento
        run: npm test

      - name: Validar build
        run: npm run build

      - name: Publicar dados alterados
        run: |
          if git diff --quiet -- public/data; then
            echo "Catálogo já estava atualizado."
            exit 0
          fi
          git config user.name "Z Connect Automação"
          git config user.email "actions@users.noreply.github.com"
          git add public/data
          git commit -m "Atualiza catálogo diário"
          git push
